<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmed & Rana</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="overlay"></div>

<div class="intro" id="intro">
  <h2>💍 Wedding Invitation</h2>
  <p>Tap to Enter</p>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">🔊</button>

<div class="main" id="main">

  <div class="section">
    <h2>Wedding Invitation</h2>
    <p>With hearts full of love and joy,<br>
    we invite you to celebrate our wedding</p>
  </div>

  <div class="section">
    <h1>Ahmed <span>&</span> Rana</h1>
  </div>

  <div class="section">
    <p>Thursday</p>
    <h2>May 14, 2026</h2>
    <p>08:00 PM</p>
  </div>

  <div class="section">
    <p>La Perla Hall - Dar El Modaraat</p>
  </div>

  <div class="section countdown">
    <div><span id="days">0</span><p>Days</p></div>
    <div><span id="hours">0</span><p>Hours</p></div>
    <div><span id="minutes">0</span><p>Minutes</p></div>
    <div><span id="seconds">0</span><p>Seconds</p></div>
  </div>

  <div class="section">
    <a href="https://maps.app.goo.gl/N2GJTLT2q1KZu8Ra8?g_st=ac" target="_blank" class="map-btn">
      📍 Get Directions
    </a>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
